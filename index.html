<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام مدرسة يزيد بن الحارث المتكامل - النسخة المصححة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --late: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; padding: 5px; }

        .card { background: #ffffff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .compact-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: fixed; margin-top: 10px; }
        .compact-table th { background: var(--primary); color: white; padding: 8px 4px; border: 1px solid #ddd; }
        .compact-table td { border: 1px solid #eee; padding: 8px 4px; text-align: center; word-wrap: break-word; }
        .col-name { width: 60%; text-align: right !important; font-weight: bold; }
        
        /* تنسيق جدول المدير المجمع */
        .admin-master-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 0.85rem; }
        .admin-master-table th { background: var(--dark); color: white; padding: 12px 5px; }
        .admin-master-table td { padding: 10px 5px; background: white; border-bottom: 1px solid #f0f0f0; font-weight: bold; }
        .admin-master-table tr:nth-child(even) td { background: #fafafa; }
        .row-total { background: #eee !important; color: var(--primary); }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-size: 0.8rem; font-weight: bold; white-space: nowrap; flex: 1; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .live-info { background: linear-gradient(135deg, var(--primary), #b21f1f); color: white; padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; display: flex; justify-content: space-around; font-size: 0.85rem; }
        .lessons-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
        .lesson-btn { background: #fff; border: 2px solid #eee; padding: 8px 12px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .lesson-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; display: none; }
        .stat-item { padding: 8px 4px; border-radius: 8px; text-align: center; font-size: 0.7rem; color: white; font-weight: bold; }
        .stat-wide { grid-column: span 1.5; padding: 10px; }
        .school-summary { background: var(--dark); color: white; padding: 15px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; margin-top: 15px; }
        .summary-box { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .summary-box span { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-export { background: #555; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 0.85rem; }
        .search-box { position: relative; }
        .search-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--accent); box-sizing: border-box; }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; z-index: 1000; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; z-index: 999; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" class="logo-img" alt="شعار المدرسة">
</div>

<div class="live-info">
    <div>📅 <b id="liveDate"></b></div>
    <div>⏰ <b id="liveTime"></b></div>
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 مدرسة يزيد بن الحارث</h3>
    <select id="classSelect" onchange="fetchClassData()" style="width:100%; padding:14px; border-radius:10px; font-weight:bold; border:2px solid #ddd;">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>

    <div class="lessons-container">
        <button class="lesson-btn active" onclick="setLesson(1, this)">حصة 1</button>
        <button class="lesson-btn" onclick="setLesson(2, this)">حصة 2</button>
        <button class="lesson-btn" onclick="setLesson(3, this)">حصة 3</button>
        <button class="lesson-btn" onclick="setLesson(4, this)">حصة 4</button>
        <button class="lesson-btn" onclick="setLesson(5, this)">حصة 5</button>
        <button class="lesson-btn" onclick="setLesson(6, this)">حصة 6</button>
        <button class="lesson-btn" onclick="setLesson(7, this)">حصة 7</button>
    </div>
    
    <div id="teacherStats" class="stats-bar">
        <div class="stat-item" style="background:var(--dark)">الطلاب: <b id="tTotal">0</b></div>
        <div class="stat-item" style="background:var(--success)">حاضر: <b id="tPres">0</b></div>
        <div class="stat-item" style="background:var(--danger)">غائب: <b id="tAbs">0</b></div>
        <div class="stat-item stat-wide" style="background:#2980b9;">نسبة الحضور: <b id="tPercP">0%</b></div>
        <div class="stat-item stat-wide" style="background:#8e44ad;">نسبة الغياب: <b id="tPercA">0%</b></div>
    </div>
</div>

<div id="loginArea" class="card" style="display:none;">
    <input type="password" id="passInput" placeholder="أدخل رمز المدير..." style="width:100%; padding:12px; border-radius:8px;">
    <button onclick="checkPassword()" class="btn-action">دخول</button>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table style="width:100%; border-collapse: collapse;" id="studentsList"></table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم✅</button>
</div>

<div id="adminPanel" style="display:none; padding-bottom:120px;">
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('periodTab', this)">تقرير الفترة</button>
            <button class="tab-btn" onclick="openTab('dailyTab', this)">غياب يوم محدد</button>
            <button class="tab-btn" onclick="openTab('historyTab', this)">سجل طالب</button>
        </div>

        <div id="periodTab" class="tab-content active">
            <div style="display: flex; gap: 5px; margin-bottom:10px;">
                <input type="date" id="periodStart" style="width:50%; padding:8px;">
                <input type="date" id="periodEnd" style="width:50%; padding:8px;">
            </div>
            <button class="btn-action" onclick="generatePeriodReport()">توليد تقرير الفترة</button>
            <div id="periodResultArea"></div>
            <button id="exportPeriodBtn" class="btn-export" style="display:none;" onclick="exportTableToText('periodResultArea', 'تقرير_الفترة')">📥 تصدير تقرير الفترة</button>
        </div>

        <div class="school-summary">
            <div class="summary-box">طلاب المدرسة <span id="sTotal">0</span></div>
            <div class="summary-box">إجمالي الغياب <span id="sAbs">0</span></div>
            <div class="summary-box">نسبة الحضور <span id="sPresPerc">0%</span></div>
            <div class="summary-box">نسبة الغياب <span id="sAbsPerc">0%</span></div>
        </div>

        <div id="masterTableContainer">
            <table class="admin-master-table" id="masterTable">
                <thead>
                    <tr>
                        <th>الصف</th>
                        <th>العدد</th>
                        <th>حضور</th>
                        <th>غياب</th>
                        <th>% حضور</th>
                        <th>% غياب</th>
                    </tr>
                </thead>
                <tbody id="masterTableBody"></tbody>
            </table>
        </div>

        <div id="dailyTab" class="tab-content">
            <input type="date" id="adminDateSelector" style="width:100%; padding:10px;" onchange="viewOldDate(this.value)">
            <div id="oldDateResult"></div>
            <button id="exportDailyBtn" class="btn-export" style="display:none;" onclick="exportDailyToText()">📥 تصدير غياب هذا اليوم</button>
        </div>

        <div id="historyTab" class="tab-content">
            <div class="search-box">
                <input type="text" id="studentSearch" class="search-input" placeholder="بحث عن طالب..." oninput="showSuggestions(this.value)">
                <div id="suggestionsBox" class="suggestions"></div>
            </div>
            <div id="historyResult"></div>
            <button id="exportHistoryBtn" class="btn-export" style="display:none;" onclick="exportTableToText('historyResult', 'سجل_طالب')">📥 تصدير سجل الطالب</button>
        </div>
    </div>
</div>

<footer class="page-footer">
    <div style="font-size: 0.75rem; color: var(--primary);">إدارة مدرسة يزيد بن الحارث</div>
    <div style="color: #333; font-weight: 800; font-size: 1rem;">الأستاذ هشام الكحالي</div>
</footer>

    let selectedLesson = 1; 
    let todayKey = new Date().toISOString().split('T')[0];

    function updateLiveClock() {
        const now = new Date();
        document.getElementById('liveDate').innerText = now.toLocaleDateString('ar-OM');
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('ar-OM', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateLiveClock, 1000); updateLiveClock();

    function setLesson(num, btn) {
        selectedLesson = num;
        document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchClassData();
    }

    // وظيفة التحقق من الغياب (الحصة الأولى كمعيار للحضور اليومي)
    function checkIsAbsent(dayData, cls, studentIdx) {
        if (!dayData || !dayData[cls]) return false;
        let lesson = dayData[cls]['حصة_1'];
        if (lesson && lesson[studentIdx]) {
            let status = lesson[studentIdx].status;
            if (status === 'a') return true;
        }
        return false;
    }

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            const list = document.getElementById('studentsList');
            list.innerHTML = "";
            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                let status = data[i]?.status || 'p';
                let borderColor = status=='a'?'#c0392b':(status=='l'?'#e67e22':'#27ae60');
                list.innerHTML += `<tr style="border-bottom: 1px solid #eee;">
                    <td class="col-name" style="padding:12px;">${name}</td>
                    <td>
                        <select id="stat${i}" onchange="this.style.borderColor=(this.value=='a'?'#c0392b':(this.value=='l'?'#e67e22':'#27ae60')); updateTeacherStats('${cls}')" style="padding:8px; border-radius:5px; border:2px solid ${borderColor};">
                            <option value="p" ${status=='p'?'selected':''}>حاضر</option>
                            <option value="a" ${status=='a'?'selected':''}>غائب</option>
                            <option value="l" ${status=='l'?'selected':''}>متأخر</option>
                        </select>
                    </td>
                </tr>`;
            });
            document.getElementById('mainAppArea').style.display = "block";
            updateTeacherStats(cls);
        });
    }

    function updateTeacherStats(cls) {
        const total = قائمة_الطلاب_كاملة[cls].length;
        let abs = 0;
        قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(document.getElementById('stat'+i)?.value === 'a') abs++; });
        let pres = total - abs;
        document.getElementById('teacherStats').style.display = 'grid';
        document.getElementById('tTotal').innerText = total;
        document.getElementById('tPres').innerText = pres;
        document.getElementById('tAbs').innerText = abs;
        document.getElementById('tPercP').innerText = Math.round((pres/total)*100) + '%';
        document.getElementById('tPercA').innerText = Math.round((abs/total)*100) + '%';
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        let update = {};
        قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم حفظ تحضير الحصة " + selectedLesson));
    }

    function adminShortcut() { 
        let c = window.clickCount || 0; c++; window.clickCount = c; 
        if(c===3) document.getElementById('loginArea').style.display="block";
        setTimeout(()=>window.clickCount=0,2000); 
    }

    function checkPassword() {
        if(document.getElementById('passInput').value === "12345678910") {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            listenToLiveAttendance(); // تفعيل المراقبة اللحظية
        } else alert("الرمز غير صحيح");
    }

    // وظيفة المراقبة اللحظية للمدير
    function listenToLiveAttendance() {
        database.ref(`attendance/${todayKey}`).on('value', (snap) => {
            const dayData = snap.val() || {};
            let schoolTotal = 0;
            let schoolAbs = 0;
            let tableHtml = "";

            Object.keys(قائمة_الطلاب_كاملة).forEach(cls => {
                const classSize = قائمة_الطلاب_كاملة[cls].length;
                let classAbs = 0;
                
                قائمة_الطلاب_كاملة[cls].forEach((_, i) => {
                    if (checkIsAbsent({[cls]: dayData[cls]}, cls, i)) classAbs++;
                });

                let classPres = classSize - classAbs;
                let pPerc = Math.round((classPres / classSize) * 100);
                let aPerc = 100 - pPerc;

                schoolTotal += classSize;
                schoolAbs += classAbs;

                tableHtml += `<tr>
                    <td style="color:var(--primary)">${cls}</td>
                    <td>${classSize}</td>
                    <td style="color:var(--success)">${classPres}</td>
                    <td style="color:var(--danger)">${classAbs}</td>
                    <td><span style="background:var(--success); color:white; padding:2px 5px; border-radius:4px;">${pPerc}%</span></td>
                    <td><span style="background:var(--danger); color:white; padding:2px 5px; border-radius:4px;">${aPerc}%</span></td>
                </tr>`;
            });

            // تحديث بطاقات الإحصاء العلوية
            document.getElementById('sTotal').innerText = schoolTotal;
            document.getElementById('sAbs').innerText = schoolAbs;
            let schoolPresPerc = schoolTotal > 0 ? Math.round(((schoolTotal - schoolAbs) / schoolTotal) * 100) : 0;
            document.getElementById('sPresPerc').innerText = schoolPresPerc + "%";
            document.getElementById('sAbsPerc').innerText = (100 - schoolPresPerc) + "%";

            // إضافة سطر الإجمالي للجدول
            let totalPres = schoolTotal - schoolAbs;
            tableHtml += `<tr class="row-total">
                <td>الإجمالي</td>
                <td>${schoolTotal}</td>
                <td>${totalPres}</td>
                <td>${schoolAbs}</td>
                <td>${schoolPresPerc}%</td>
                <td>${100 - schoolPresPerc}%</td>
            </tr>`;

            document.getElementById('masterTableBody').innerHTML = tableHtml;
        });
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function generatePeriodReport() {
        const start = document.getElementById('periodStart').value;
        const end = document.getElementById('periodEnd').value;
        if (!start || !end) return;
        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let summary = {};
            Object.keys(allData).forEach(date => {
                if (date >= start && date <= end) {
                    Object.keys(allData[date]).forEach(cls => {
                        if (قائمة_الطلاب_كاملة[cls]) {
                            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                                if (checkIsAbsent(allData[date], cls, i)) {
                                    if (!summary[name]) summary[name] = { count: 0, cls: cls };
                                    summary[name].count++;
                                }
                            });
                        }
                    });
                }
            });
            let sorted = Object.entries(summary).sort((a,b) => b[1].count - a[1].count);
            let html = `<table class="compact-table"><thead><tr><th class="col-name">الاسم</th><th>الصف</th><th>غ</th></tr></thead><tbody>`;
            sorted.forEach(([name, info]) => {
                html += `<tr><td class="col-name">${name}</td><td>${info.cls}</td><td style="color:red; font-weight:bold;">${info.count}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('periodResultArea').innerHTML = sorted.length > 0 ? html : "<p style='text-align:center;'>لا يوجد غيابات مسجلة</p>";
            document.getElementById('exportPeriodBtn').style.display = sorted.length > 0 ? "block" : "none";
        });
    }

    function viewOldDate(date) {
        database.ref('attendance/' + date).once('value', (snap) => {
            const dayData = snap.val() || {};
            let html = ""; let absTotal = 0;
            Object.keys(قائمة_الطلاب_كاملة).forEach(cls => {
                let list = [];
                قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                    if (checkIsAbsent({[cls]: dayData[cls]}, cls, i)) {
                        list.push({name, status: 'غائب', color: 'red'}); absTotal++;
                    }
                });
                if(list.length > 0) {
                    html += `<div style="margin-top:10px; border:1px solid #ddd; border-radius:8px; overflow:hidden;">
                        <div style="background:#eee; padding:5px; font-weight:bold; font-size:0.8rem;">صف: ${cls}</div>
                        <table class="compact-table" style="margin-top:0;">
                        ${list.map(item => `<tr><td class="col-name">${item.name}</td><td style="color:${item.color};">${item.status}</td></tr>`).join('')}
                        </table>
                    </div>`;
                }
            });
            document.getElementById('oldDateResult').innerHTML = html || "<p style='text-align:center;'>لا يوجد غيابات لهذا التاريخ</p>";
            document.getElementById('exportDailyBtn').style.display = absTotal > 0 ? "block" : "none";
        });
    }

    function showSuggestions(val) {
        const box = document.getElementById('suggestionsBox');
        if (val.length < 2) { box.style.display = 'none'; return; }
        let matches = [];
        Object.keys(قائمة_الطلاب_كاملة).forEach(cls => {
            قائمة_الطلاب_كاملة[cls].forEach(name => { if (name.includes(val)) matches.push({name, cls}); });
        });
        box.innerHTML = matches.slice(0, 5).map(m => `<div class="suggestion-item" onclick="selectStudent('${m.name}', '${m.cls}')">${m.name} (${m.cls})</div>`).join('');
        box.style.display = matches.length > 0 ? 'block' : 'none';
    }

    function selectStudent(name, cls) {
        document.getElementById('studentSearch').value = name;
        document.getElementById('suggestionsBox').style.display = 'none';
        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let html = `<table class="compact-table"><thead><tr><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>`;
            let recordCount = 0;
            const idx = قائمة_الطلاب_كاملة[cls].indexOf(name);
            Object.keys(allData).sort().reverse().forEach(date => {
                if (checkIsAbsent(allData[date], cls, idx)) {
                    recordCount++; html += `<tr><td>${date}</td><td style="color:red;">غائب</td></tr>`;
                }
            });
            html += `</tbody></table>`;
            document.getElementById('historyResult').innerHTML = recordCount > 0 ? html : "<p style='text-align:center;'>هذا الطالب ليس لديه سجل غياب</p>";
            document.getElementById('exportHistoryBtn').style.display = recordCount > 0 ? "block" : "none";
        });
    }

    function exportTableToText(cid, fname) {
        let text = `تقرير مدرسة يزيد بن الحارث - ${fname}\n---------------------------------\n`;
        document.querySelectorAll(`#${cid} tr`).forEach(r => {
            let cols = r.querySelectorAll("td, th");
            text += Array.from(cols).map(c => c.innerText).join(" | ") + "\n";
        });
        downloadTxt(text, fname);
    }

    function exportDailyToText() {
        let date = document.getElementById('adminDateSelector').value;
        let text = `غياب يوم: ${date}\n---------------------------------\n`;
        document.querySelectorAll("#oldDateResult div").forEach(div => {
            let h = div.querySelector("div")?.innerText;
            if(h) {
                text += `\n[ ${h} ]\n`;
                text += Array.from(div.querySelectorAll("tr")).map(tr => "- " + tr.querySelector("td").innerText + " (" + tr.querySelectorAll("td")[1].innerText + ")").join("\n") + "\n";
            }
        });
        downloadTxt(text, `غياب_${date}`);
    }

    function downloadTxt(text, name) {
        const blob = new Blob([text], {type: "text/plain;charset=utf-8"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${name}.txt`;
        link.click();
    }
</script>
</body>
</html>
