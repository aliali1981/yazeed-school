<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام مدرسة يزيد بن الحارث - النسخة الاحترافية الشاملة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --info: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        
        /* الهيدر والشعار */
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); background: white; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .card { background: #ffffff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; overflow: hidden; }
        
        /* عدادات المعلم */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .stat-box { padding: 10px 5px; border-radius: 10px; text-align: center; color: white; font-weight: bold; font-size: 0.75rem; }
        .stat-full { grid-column: span 1.5; font-size: 0.85rem; }

        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .main-table th { background: linear-gradient(to bottom, var(--primary), #2a5298); color: white; padding: 12px 5px; border: 1px solid #eee; }
        .main-table td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #f0f0f0; background: white; font-weight: 600; }
        .main-table tr:nth-child(even) td { background: #fdfdfd; }
        
        /* لوحة المدير */
        .admin-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-card { background: var(--dark); color: white; padding: 12px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .summary-card span { display: block; font-size: 1.2rem; color: var(--accent); font-weight: 800; }

        /* الأزرار والقوائم */
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-action:active { transform: scale(0.98); }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        
        .lessons-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 15px 0; }
        .lesson-btn { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .lesson-btn.active { background: var(--accent); color: white; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" class="logo-img" alt="شعار المدرسة">
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 مدرسة يزيد بن الحارث</h3>
    
    <select id="classSelect" onchange="fetchClassData()" style="width:100%; padding:14px; border-radius:10px; font-weight:bold; border:2px solid #ddd; background:#fff;">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>

    <div class="lessons-container" id="lessonsBar">
        <button class="lesson-btn active" onclick="setLesson(1, this)">حصة 1</button>
        <button class="lesson-btn" onclick="setLesson(2, this)">حصة 2</button>
        <button class="lesson-btn" onclick="setLesson(3, this)">حصة 3</button>
        <button class="lesson-btn" onclick="setLesson(4, this)">حصة 4</button>
        <button class="lesson-btn" onclick="setLesson(5, this)">حصة 5</button>
        <button class="lesson-btn" onclick="setLesson(6, this)">حصة 6</button>
        <button class="lesson-btn" onclick="setLesson(7, this)">حصة 7</button>
    </div>

    <div id="teacherStats" class="stats-grid" style="display:none;">
        <div class="stat-box" style="background:var(--dark)">الطلاب<br><span id="tTotal">0</span></div>
        <div class="stat-box" style="background:var(--success)">حاضر<br><span id="tPres">0</span></div>
        <div class="stat-box" style="background:var(--danger)">غائب<br><span id="tAbs">0</span></div>
        <div class="stat-box stat-full" style="background:var(--info)">نسبة الحضور: <span id="tPercP">0%</span></div>
        <div class="stat-box stat-full" style="background:#8e44ad">نسبة الغياب: <span id="tPercA">0%</span></div>
    </div>
</div>

<div id="loginArea" class="card" style="display:none;">
    <input type="password" id="passInput" placeholder="أدخل رمز المدير..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">
    <button onclick="checkPassword()" class="btn-action">دخول الصلاحيات</button>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table class="main-table" id="studentsListTable">
        <thead>
            <tr>
                <th style="width:15%">م</th>
                <th style="width:55%">اسم الطالب</th>
                <th style="width:30%">الحالة</th>
            </tr>
        </thead>
        <tbody id="studentsListBody"></tbody>
    </table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم ✅</button>
</div>

<div id="adminPanel" style="display:none; padding-bottom:120px;">
    
    <div class="admin-summary">
        <div class="summary-card">طلاب المدرسة <span id="sTotal">0</span></div>
        <div class="summary-card">إجمالي الغياب <span id="sAbs">0</span></div>
        <div class="summary-card">نسبة الحضور <span id="sPresPerc">0%</span></div>
        <div class="summary-card">نسبة الغياب <span id="sAbsPerc">0%</span></div>
    </div>

    <div class="card" style="padding:0;">
        <table class="main-table">
            <thead>
                <tr>
                    <th>الصف</th>
                    <th>العدد</th>
                    <th>حاضر</th>
                    <th>غائب</th>
                    <th>% حضور</th>
                </tr>
            </thead>
            <tbody id="masterTableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('periodTab', this)">تقرير فترة</button>
            <button class="tab-btn" onclick="openTab('dailyTab', this)">غياب يوم</button>
            <button class="tab-btn" onclick="openTab('historyTab', this)">بحث طالب</button>
        </div>

        <div id="periodTab" class="tab-content active">
            <div style="display: flex; gap: 5px;">
                <input type="date" id="periodStart" style="flex:1; padding:8px;">
                <input type="date" id="periodEnd" style="flex:1; padding:8px;">
            </div>
            <button class="btn-action" onclick="generatePeriodReport()">توليد تقرير</button>
            <div id="periodResultArea"></div>
            <button id="exportPeriodBtn" class="btn-excel" style="display:none;" onclick="exportPeriodToExcel()">📥 تصدير الفترة إلى Excel</button>
        </div>

        <div id="dailyTab" class="tab-content">
            <input type="date" id="adminDateSelector" style="width:100%; padding:10px;" onchange="viewOldDate(this.value)">
            <div id="oldDateResult"></div>
            <button id="exportDailyBtn" class="btn-excel" style="display:none;" onclick="exportDailyToExcel()">📥 تصدير اليوم إلى Excel</button>
        </div>

        <div id="historyTab" class="tab-content">
            <input type="text" id="studentSearch" style="width:100%; padding:12px; border:2px solid var(--accent); border-radius:8px;" placeholder="ابحث عن اسم الطالب..." oninput="showSuggestions(this.value)">
            <div id="suggestionsBox" style="background:#fff; border:1px solid #ddd; display:none;"></div>
            <div id="historyResult"></div>
        </div>
    </div>
</div>

<footer class="page-footer">
    <div style="font-size: 0.7rem; color: #777;">نظام الإدارة الرقمي - مدرسة يزيد بن الحارث</div>
    <div style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">الأستاذ هشام الكحالي</div>
</footer>

    let selectedLesson = 1;
    let todayKey = new Date().toISOString().split('T')[0];
    let g_periodExcel = [];
    let g_dailyExcel = [];

    function setLesson(num, btn) {
        selectedLesson = num;
        document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchClassData();
    }

    // فحص الغياب العميق (كما في الكود السابق لضمان ظهور كل الغياب)
    function checkIsAbsent(dayData, cls, studentIdx) {
        if (!dayData || !dayData[cls]) return false;
        let classData = dayData[cls];
        for (let key in classData) {
            if (classData[key] && classData[key][studentIdx] && classData[key][studentIdx].status === 'a') return true;
        }
        return false;
    }

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            const listBody = document.getElementById('studentsListBody');
            listBody.innerHTML = "";
            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                let status = data[i]?.status || 'p';
                let color = status=='a'?'var(--danger)':(status=='l'?'var(--accent)':'var(--success)');
                listBody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td style="text-align:right; padding-right:15px;">${name}</td>
                    <td>
                        <select id="stat${i}" onchange="updateRowColor(this); updateTeacherStats('${cls}')" style="padding:5px; border-radius:5px; border:2px solid ${color};">
                            <option value="p" ${status=='p'?'selected':''}>حاضر</option>
                            <option value="a" ${status=='a'?'selected':''}>غائب</option>
                            <option value="l" ${status=='l'?'selected':''}>متأخر</option>
                        </select>
                    </td>
                </tr>`;
            });
            document.getElementById('mainAppArea').style.display = "block";
            updateTeacherStats(cls);
        });
    }

    function updateRowColor(sel) {
        let color = sel.value=='a'?'var(--danger)':(sel.value=='l'?'var(--accent)':'var(--success)');
        sel.style.borderColor = color;
    }

    function updateTeacherStats(cls) {
        const total = قائمة_الطلاب_كاملة[cls].length;
        let abs = 0;
        قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(document.getElementById('stat'+i)?.value === 'a') abs++; });
        let pres = total - abs;
        document.getElementById('teacherStats').style.display = 'grid';
        document.getElementById('tTotal').innerText = total;
        document.getElementById('tPres').innerText = pres;
        document.getElementById('tAbs').innerText = abs;
        document.getElementById('tPercP').innerText = Math.round((pres/total)*100) + '%';
        document.getElementById('tPercA').innerText = Math.round((abs/total)*100) + '%';
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        let update = {};
        قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم الحفظ بنجاح"));
    }

    // صلاحيات المدير
    function adminShortcut() { 
        window.clickC = (window.clickC || 0) + 1;
        if(window.clickC === 3) document.getElementById('loginArea').style.display="block";
        setTimeout(()=>window.clickC=0, 2000);
    }

    function checkPassword() {
        if(document.getElementById('passInput').value === "12345678910") {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            startLiveAdminSync();
        } else alert("خطأ في الرمز");
    }

    function startLiveAdminSync() {
        database.ref(`attendance/${todayKey}`).on('value', (snap) => {
            const dayData = snap.val() || {};
            let schTotal = 0, schAbs = 0, tableHtml = "";
            
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let cSize = قائمة_الطلاب_كاملة[cls].length;
                let cAbs = 0;
                قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(checkIsAbsent({[cls]: dayData[cls]}, cls, i)) cAbs++; });
                
                schTotal += cSize; schAbs += cAbs;
                let pPerc = Math.round(((cSize-cAbs)/cSize)*100);
                
                tableHtml += `<tr>
                    <td style="background:#eee;">${cls}</td>
                    <td>${cSize}</td>
                    <td style="color:var(--success)">${cSize-cAbs}</td>
                    <td style="color:var(--danger)">${cAbs}</td>
                    <td style="background:#f9f9f9;">${pPerc}%</td>
                </tr>`;
            });
            
            document.getElementById('sTotal').innerText = schTotal;
            document.getElementById('sAbs').innerText = schAbs;
            let totalPresPerc = Math.round(((schTotal-schAbs)/schTotal)*100);
            document.getElementById('sPresPerc').innerText = totalPresPerc + "%";
            document.getElementById('sAbsPerc').innerText = (100 - totalPresPerc) + "%";
            document.getElementById('masterTableBody').innerHTML = tableHtml;
        });
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

    // تقرير الفترة والتصدير
    function generatePeriodReport() {
        const start = document.getElementById('periodStart').value;
        const end = document.getElementById('periodEnd').value;
        if(!start || !end) return;
        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let res = {};
            Object.keys(allData).forEach(date => {
                if(date >= start && date <= end) {
                    Object.keys(allData[date]).forEach(cls => {
                        قائمة_الطلاب_كاملة[cls]?.forEach((name, i) => {
                            if(checkIsAbsent(allData[date], cls, i)) {
                                if(!res[name]) res[name] = { cls: cls, count: 0 };
                                res[name].count++;
                            }
                        });
                    });
                }
            });
            
            g_periodExcel = Object.entries(res).map(([name, info]) => ({
                'الاسم': name, 'الصف': info.cls, 'عدد أيام الغياب': info.count
            })).sort((a,b) => a.الصف.localeCompare(b.الصف));

            let html = `<table class="main-table"><thead><tr><th>م</th><th>الاسم</th><th>غ</th></tr></thead><tbody>`;
            g_periodExcel.forEach((row, i) => {
                html += `<tr><td>${i+1}</td><td style="text-align:right;">${row['الاسم']} (${row['الصف']})</td><td style="color:red">${row['عدد أيام الغياب']}</td></tr>`;
            });
            document.getElementById('periodResultArea').innerHTML = html + "</tbody></table>";
            document.getElementById('exportPeriodBtn').style.display = "block";
        });
    }

    function viewOldDate(date) {
        database.ref('attendance/' + date).once('value', (snap) => {
            const data = snap.val() || {};
            g_dailyExcel = [];
            let html = "";
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let list = [];
                قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                    if(checkIsAbsent({[cls]: data[cls]}, cls, i)) list.push(name);
                });
                if(list.length > 0) {
                    html += `<div style="margin-top:10px; border:1px solid #ddd;"><div style="background:#eee; padding:5px; font-weight:bold;">صف: ${cls}</div>`;
                    list.forEach((n, idx) => {
                        html += `<div style="padding:5px; border-bottom:1px solid #eee;">${idx+1}. ${n}</div>`;
                        g_dailyExcel.push({ 'م': g_dailyExcel.length+1, 'اسم الطالب': n, 'الصف': cls, 'التاريخ': date });
                    });
                    html += `</div>`;
                }
            });
            document.getElementById('oldDateResult').innerHTML = html || "لا غيابات";
            document.getElementById('exportDailyBtn').style.display = g_dailyExcel.length > 0 ? "block" : "none";
        });
    }

    function exportPeriodToExcel() {
        const ws = XLSX.utils.json_to_sheet(g_periodExcel.map((r, i) => ({'م': i+1, ...r})));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "التقرير");
        XLSX.writeFile(wb, "تقرير_فترة_يزيد.xlsx");
    }

    function exportDailyToExcel() {
        const ws = XLSX.utils.json_to_sheet(g_dailyExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "غياب_يومي");
        XLSX.writeFile(wb, `غياب_${document.getElementById('adminDateSelector').value}.xlsx`);
    }

    // البحث
    function showSuggestions(val) {
        const box = document.getElementById('suggestionsBox');
        if(val.length < 2) { box.style.display='none'; return; }
        let matches = [];
        Object.keys(قائمة_الطلاب_كاملة).forEach(cls => {
            قائمة_الطلاب_كاملة[cls].forEach(name => { if(name.includes(val)) matches.push({name, cls}); });
        });
        box.innerHTML = matches.slice(0,5).map(m => `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="selectStudent('${m.name}', '${m.cls}')">${m.name} (${m.cls})</div>`).join('');
        box.style.display = 'block';
    }

    function selectStudent(name, cls) {
        document.getElementById('studentSearch').value = name;
        document.getElementById('suggestionsBox').style.display = 'none';
        database.ref('attendance').once('value', (snap) => {
            const data = snap.val() || {};
            let html = `<table class="main-table"><thead><tr><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>`;
            const idx = قائمة_الطلاب_كاملة[cls].indexOf(name);
            Object.keys(data).forEach(d => {
                if(checkIsAbsent(data[d], cls, idx)) html += `<tr><td>${d}</td><td style="color:red">غائب</td></tr>`;
            });
            document.getElementById('historyResult').innerHTML = html + "</tbody></table>";
        });
    }
</script>
