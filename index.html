<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام مدرسة يزيد بن الحارث - النسخة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --info: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); background: white; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .card { background: #ffffff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; overflow: hidden; }
        
        /* تنسيق الجداول الاحترافي الجديد */
        .pro-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        .pro-table th { background: var(--primary); color: white; padding: 12px; font-size: 0.85rem; }
        .pro-table td { background: white; padding: 12px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; font-weight: bold; }
        .pro-table tr td:first-child { border-right: 4px solid var(--accent); border-radius: 0 10px 10px 0; }
        .pro-table tr td:last-child { border-radius: 10px 0 0 10px; }

        /* سجل الطالب (البطاقات) */
        .result-item { background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--info); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .result-header { color: var(--primary); font-weight: 800; border-bottom: 1px dashed #ccc; padding-bottom: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .stat-box { padding: 10px 5px; border-radius: 10px; text-align: center; color: white; font-weight: bold; font-size: 0.75rem; }
        .stat-full { grid-column: span 1.5; font-size: 0.85rem; }

        .main-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .main-table th { background: linear-gradient(to bottom, var(--primary), #2a5298); color: white; padding: 10px 2px; }
        .main-table td { padding: 10px 2px; text-align: center; border-bottom: 1px solid #eee; font-weight: 700; }
        
        .row-5 { background-color: #f1f8ff; } .row-6 { background-color: #f0fff4; } .row-7 { background-color: #fffaf0; } .row-8 { background-color: #f5f3ff; }

        .admin-summary { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 15px; }
        .summary-card { background: var(--dark); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); grid-column: span 2; }
        .summary-card.wide { grid-column: span 3; }
        .summary-card span { display: block; font-size: 1.1rem; color: var(--accent); font-weight: 800; }

        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-update { background: #d35400; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        
        .lessons-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 15px 0; }
        .lesson-btn { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .lesson-btn.active { background: var(--accent); color: white; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; z-index: 1000; }
        
        input, select { border: 2px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" class="logo-img" alt="شعار المدرسة">
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 مدرسة يزيد بن الحارث</h3>
    <select id="classSelect" onchange="fetchClassData()" style="width:100%; padding:14px; font-weight:bold;">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>
    <div class="lessons-container">
        <button class="lesson-btn active" onclick="setLesson(1, this)">حصة 1</button>
        <button class="lesson-btn" onclick="setLesson(2, this)">حصة 2</button>
        <button class="lesson-btn" onclick="setLesson(3, this)">حصة 3</button>
        <button class="lesson-btn" onclick="setLesson(4, this)">حصة 4</button>
        <button class="lesson-btn" onclick="setLesson(5, this)">حصة 5</button>
        <button class="lesson-btn" onclick="setLesson(6, this)">حصة 6</button>
        <button class="lesson-btn" onclick="setLesson(7, this)">حصة 7</button>
    </div>
    <div id="teacherStats" class="stats-grid" style="display:none;">
        <div class="stat-box" style="background:var(--dark)">الطلاب<br><span id="tTotal">0</span></div>
        <div class="stat-box" style="background:var(--success)">حاضر<br><span id="tPres">0</span></div>
        <div class="stat-box" style="background:var(--danger)">غائب<br><span id="tAbs">0</span></div>
        <div class="stat-box stat-full" style="background:var(--info)">نسبة الحضور: <span id="tPercP">0%</span></div>
        <div class="stat-box stat-full" style="background:#8e44ad">نسبة الغياب: <span id="tPercA">0%</span></div>
    </div>
</div>

<div id="loginArea" class="card" style="display:none;">
    <input type="password" id="passInput" placeholder="أدخل رمز المدير..." style="width:100%; padding:12px;">
    <button onclick="checkPassword()" class="btn-action">دخول الصلاحيات</button>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table class="main-table">
        <thead><tr><th>م</th><th>اسم الطالب</th><th>الحالة</th></tr></thead>
        <tbody id="studentsListBody"></tbody>
    </table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم ✅</button>
</div>

<div id="adminPanel" style="display:none; padding-bottom:120px;">
    <div class="admin-summary">
        <div class="summary-card">إجمالي الطلاب <span id="sTotal">0</span></div>
        <div class="summary-card">عدد الحضور <span id="sPres">0</span></div>
        <div class="summary-card">عدد الغياب <span id="sAbs">0</span></div>
        <div class="summary-card wide">نسبة الحضور <span id="sPresPerc">0%</span></div>
        <div class="summary-card wide">نسبة الغياب <span id="sAbsPerc">0%</span></div>
    </div>

    <div class="card" style="padding:0;">
        <table class="main-table">
            <thead>
                <tr><th style="width:18%">الصف</th><th style="width:15%">العدد</th><th style="width:15%">حاضر</th><th style="width:15%">غائب</th><th style="width:18%">% حضور</th><th style="width:18%">% غياب</th></tr>
            </thead>
            <tbody id="masterTableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('periodTab', this)">تقرير فترة</button>
            <button class="tab-btn" onclick="openTab('dailyTab', this)">غياب يوم</button>
            <button class="tab-btn" onclick="openTab('historyTab', this)">بحث طالب</button>
        </div>

        <div id="periodTab" class="tab-content active">
            <div style="display: flex; gap: 5px; margin-bottom:10px;">
                <input type="date" id="periodStart" style="flex:1; padding:10px;">
                <input type="date" id="periodEnd" style="flex:1; padding:10px;">
            </div>
            <button class="btn-action" onclick="generatePeriodReport()">توليد تقرير الفترة</button>
            <div id="periodResultArea" style="margin-top:15px;"></div>
            <button id="exportPeriodBtn" class="btn-excel" style="display:none;" onclick="exportPeriodToExcel()">📥 تصدير الفترة إلى Excel</button>
        </div>

        <div id="dailyTab" class="tab-content">
            <input type="date" id="adminDateSelector" style="width:100%; padding:10px;" onchange="viewOldDate(this.value)">
            <select id="adminClassEditSelector" style="width:100%; padding:10px; margin-top:10px; display:none;" onchange="viewOldDate(document.getElementById('adminDateSelector').value)">
                <option value="">-- اختر الصف للتعديل --</option>
                <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
                <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
                <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
                <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
            </select>
            <div id="oldDateResult" style="margin-top:15px;"></div>
            <button id="updateDailyBtn" class="btn-update" style="display:none;" onclick="updateFirebaseOldDate()">💾 اعتماد التعديلات وحفظها</button>
            <button id="exportDailyBtn" class="btn-excel" style="display:none;" onclick="exportDailyToExcel()">📥 تصدير اليوم إلى Excel</button>
        </div>

        <div id="historyTab" class="tab-content">
            <input type="text" id="studentSearch" style="width:100%; padding:12px; border:2px solid var(--accent);" placeholder="ابحث عن اسم الطالب..." oninput="showSuggestions(this.value)">
            <div id="suggestionsBox" style="background:#fff; border:1px solid #ddd; display:none; max-height: 200px; overflow-y: auto; position: absolute; width: 85%; z-index: 100;"></div>
            <div id="historyResult" style="margin-top:20px;"></div>
            <button id="exportStudentHistoryBtn" class="btn-excel" style="display:none; background: var(--info);" onclick="exportIndividualStudentExcel()">📥 تصدير سجل غياب الطالب (Excel)</button>
        </div>
    </div>
</div>

<footer class="page-footer">
    <div style="font-size: 0.7rem; color: #777;">نظام الإدارة الرقمي - مدرسة يزيد بن الحارث</div>
    <div style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">الأستاذ هشام الكحالي</div>
</footer>

    let selectedLesson = 1;
    let todayKey = new Date().toISOString().split('T')[0];
    let g_periodDataRaw = []; let g_dailyDataRaw = []; let currentStudentHistory = [];

    function setLesson(num, btn) {
        selectedLesson = num;
        document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); fetchClassData();
    }

    function checkIsAbsent(dayData, cls, studentIdx) {
        if (!dayData || !dayData[cls]) return false;
        let classData = dayData[cls];
        for (let key in classData) {
            if (classData[key] && classData[key][studentIdx] && classData[key][studentIdx].status === 'a') return true;
        }
        return false;
    }

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            const listBody = document.getElementById('studentsListBody');
            listBody.innerHTML = "";
            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                let status = data[i]?.status || 'p';
                let color = status=='a'?'var(--danger)':(status=='l'?'var(--accent)':'var(--success)');
                listBody.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right; padding-right:15px;">${name}</td><td><select id="stat${i}" onchange="updateRowColor(this); updateTeacherStats('${cls}')" style="border:2px solid ${color}; padding:5px; border-radius:5px;"><option value="p" ${status=='p'?'selected':''}>حاضر</option><option value="a" ${status=='a'?'selected':''}>غائب</option><option value="l" ${status=='l'?'selected':''}>متأخر</option></select></td></tr>`;
            });
            document.getElementById('mainAppArea').style.display = "block";
            updateTeacherStats(cls);
        });
    }

    function updateRowColor(sel) { sel.style.borderColor = sel.value=='a'?'var(--danger)':(sel.value=='l'?'var(--accent)':'var(--success)'); }

    function updateTeacherStats(cls) {
        const total = قائمة_الطلاب_كاملة[cls].length;
        let abs = 0; قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(document.getElementById('stat'+i)?.value === 'a') abs++; });
        let pres = total - abs;
        document.getElementById('teacherStats').style.display = 'grid';
        document.getElementById('tTotal').innerText = total; document.getElementById('tPres').innerText = pres; document.getElementById('tAbs').innerText = abs;
        document.getElementById('tPercP').innerText = Math.round((pres/total)*100) + '%';
        document.getElementById('tPercA').innerText = Math.round((abs/total)*100) + '%';
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value; if(!cls) return;
        let update = {}; قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم حفظ تحضير الحصة " + selectedLesson));
    }

    function adminShortcut() { 
        window.cCount = (window.cCount || 0) + 1;
        if(window.cCount === 3) document.getElementById('loginArea').style.display="block";
        setTimeout(()=>window.cCount=0, 2000);
    }

    function checkPassword() {
        if(document.getElementById('passInput').value === "12345678910") {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            startAdminSync();
        } else alert("رمز غير صحيح");
    }

    function startAdminSync() {
        database.ref(`attendance/${todayKey}`).on('value', (snap) => {
            const dayData = snap.val() || {};
            let schTotal = 0, schAbs = 0, html = "";
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let cSize = قائمة_الطلاب_كاملة[cls].length;
                let cAbs = 0;
                قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(checkIsAbsent({[cls]: dayData[cls]}, cls, i)) cAbs++; });
                schTotal += cSize; schAbs += cAbs;
                let pPerc = Math.round(((cSize-cAbs)/cSize)*100);
                html += `<tr class="row-${cls[0]}"><td>${cls}</td><td>${cSize}</td><td>${cSize-cAbs}</td><td style="color:var(--danger)">${cAbs}</td><td>${pPerc}%</td><td>${100-pPerc}%</td></tr>`;
            });
            document.getElementById('sTotal').innerText = schTotal;
            document.getElementById('sPres').innerText = schTotal - schAbs;
            document.getElementById('sAbs').innerText = schAbs;
            let totalPerc = Math.round(((schTotal-schAbs)/schTotal)*100);
            document.getElementById('sPresPerc').innerText = totalPerc + "%";
            document.getElementById('sAbsPerc').innerText = (100 - totalPerc) + "%";
            document.getElementById('masterTableBody').innerHTML = html;
        });
    }

    function generatePeriodReport() {
        const start = document.getElementById('periodStart').value;
        const end = document.getElementById('periodEnd').value;
        if(!start || !end) return;
        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            g_periodDataRaw = []; let counts = {};
            Object.keys(allData).forEach(date => {
                if(date >= start && date <= end) {
                    Object.keys(allData[date]).forEach(cls => {
                        قائمة_الطلاب_كاملة[cls]?.forEach((name, i) => {
                            if(checkIsAbsent(allData[date], cls, i)) {
                                if(!counts[name]) counts[name] = { cls: cls, count: 0 };
                                counts[name].count++;
                            }
                        });
                    });
                }
            });
            g_periodDataRaw = Object.entries(counts).map(([name, info]) => ({ 'الاسم': name, 'الصف': info.cls, 'عدد أيام الغياب': info.count }));
            let html = `<table class="pro-table"><thead><tr><th>الاسم</th><th>الصف</th><th>غ</th></tr></thead><tbody>`;
            g_periodDataRaw.sort((a,b)=>a.الصف.localeCompare(b.الصف)).forEach((r) => {
                html += `<tr><td style="text-align:right; color:var(--primary)">${r.الاسم}</td><td>${r.الصف}</td><td style="color:var(--danger)">${r['عدد أيام الغياب']}</td></tr>`;
            });
            document.getElementById('periodResultArea').innerHTML = html + "</tbody></table>";
            document.getElementById('exportPeriodBtn').style.display = "block";
        });
    }

    function viewOldDate(date) {
        if(!date) return;
        document.getElementById('adminClassEditSelector').style.display = 'block';
        const targetCls = document.getElementById('adminClassEditSelector').value;
        database.ref('attendance/' + date).once('value', (snap) => {
            const data = snap.val() || {};
            g_dailyDataRaw = []; let html = "";
            if(targetCls) {
                html += `<div class="result-item" style="border-right-color:var(--accent)">
                            <div class="result-header">تعديل سجل صف: ${targetCls}</div>
                            <table class="main-table"><thead><tr><th>الاسم</th><th>الحالة</th></tr></thead><tbody>`;
                قائمة_الطلاب_كاملة[targetCls].forEach((name, i) => {
                    let isAbs = checkIsAbsent({[targetCls]: data[targetCls]}, targetCls, i);
                    html += `<tr><td style="text-align:right;">${name}</td><td><select class="edit-old-stat" data-idx="${i}"><option value="p" ${!isAbs?'selected':''}>حاضر</option><option value="a" ${isAbs?'selected':''}>غائب</option></select></td></tr>`;
                });
                html += `</tbody></table></div>`;
                document.getElementById('updateDailyBtn').style.display = "block";
            }
            let summaryHtml = "<div style='margin-top:20px; font-weight:bold; color:var(--primary)'>ملخص غياب اليوم:</div>";
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let list = [];
                قائمة_الطلاب_كاملة[cls].forEach((name, i) => { if(checkIsAbsent({[cls]: data[cls]}, cls, i)) { list.push(name); g_dailyDataRaw.push({ 'الاسم': name, 'الصف': cls, 'الحالة': 'غائب' }); }});
                if(list.length > 0) {
                    summaryHtml += `<div class="result-item"><div class="result-header">الصف: ${cls} <span style="color:var(--danger)">(${list.length})</span></div><div style="font-size:0.85rem; line-height:1.6;">${list.join(' • ')}</div></div>`;
                }
            });
            document.getElementById('oldDateResult').innerHTML = html + summaryHtml;
            document.getElementById('exportDailyBtn').style.display = g_dailyDataRaw.length > 0 ? "block" : "none";
        });
    }

    function updateFirebaseOldDate() {
        const date = document.getElementById('adminDateSelector').value;
        const cls = document.getElementById('adminClassEditSelector').value;
        if(!date || !cls) return;
        let updateData = {};
        document.querySelectorAll('.edit-old-stat').forEach(select => { updateData[select.getAttribute('data-idx')] = { status: select.value }; });
        database.ref(`attendance/${date}/${cls}/حصة_1`).set(updateData).then(() => { alert("✅ تم التحديث بنجاح"); viewOldDate(date); });
    }

    function exportWithTabs(dataArray, filename) {
        const wb = XLSX.utils.book_new();
        const grouped = dataArray.reduce((acc, obj) => { if (!acc[obj.الصف]) acc[obj.الصف] = []; acc[obj.الصف].push(obj); return acc; }, {});
        Object.keys(grouped).sort().forEach(cls => {
            const ws = XLSX.utils.json_to_sheet(grouped[cls].map((item, index) => ({ 'م': index + 1, ...item })));
            XLSX.utils.book_append_sheet(wb, ws, cls);
        });
        XLSX.writeFile(wb, `${filename}.xlsx`);
    }

    function exportPeriodToExcel() { exportWithTabs(g_periodDataRaw, "تقرير_فترة"); }
    function exportDailyToExcel() { exportWithTabs(g_dailyDataRaw, "غياب_يومي_" + document.getElementById('adminDateSelector').value); }

    function showSuggestions(val) {
        const box = document.getElementById('suggestionsBox');
        if(val.length < 2) { box.style.display='none'; return; }
        let matches = [];
        Object.keys(قائمة_الطلاب_كاملة).forEach(cls => { قائمة_الطلاب_كاملة[cls].forEach(name => { if(name.includes(val)) matches.push({name, cls}); }); });
        box.innerHTML = matches.slice(0,8).map(m => `<div style="padding:12px; border-bottom:1px solid #eee; cursor:pointer;" onclick="selectStudent('${m.name}', '${m.cls}')"><b>${m.name}</b> <small style="color:var(--info)">(${m.cls})</small></div>`).join('');
        box.style.display = matches.length > 0 ? 'block' : 'none';
    }

    function selectStudent(name, cls) {
        document.getElementById('studentSearch').value = name;
        document.getElementById('suggestionsBox').style.display = 'none';
        database.ref('attendance').once('value', (snap) => {
            const data = snap.val() || {};

                }
            });
            document.getElementById('historyResult').innerHTML = (mCount > 0) ? html : "<div class='result-item'>هذا الطالب ملتزم ولم يسجل له أي غياب.</div>";
            document.getElementById('exportStudentHistoryBtn').style.display = (mCount > 0) ? "block" : "none";
        });
    }

    function exportIndividualStudentExcel() {
        const name = document.getElementById('studentSearch').value;
        const cls = Object.keys(قائمة_الطلاب_كاملة).find(c => قائمة_الطلاب_كاملة[c].includes(name));
        const exportData = currentStudentHistory.map((rec, index) => ({ 'م': index + 1, 'الاسم': name, 'الصف': cls, 'التاريخ': rec['التاريخ'], 'الحالة': rec['الحالة'] }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "سجل غياب"); XLSX.writeFile(wb, `سجل_${name}.xlsx`);
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }
</script>
</body>
